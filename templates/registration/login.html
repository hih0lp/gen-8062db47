{% extends 'base.html' %}

{% block title %}Вход в админ-панель{% endblock %}

{% block content %}
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-emerald-50 to-amber-50 py-12">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h1 class="text-3xl font-bold text-center mb-8 text-emerald-800">Вход для администратора</h1>
            <form method="post">
                {% csrf_token %}
                <div class="space-y-6">
                    <div>
                        <label class="block text-gray-700 mb-2">Имя пользователя</label>
                        <input type="text" name="username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Пароль</label>
                        <input type="password" name="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent" required>
                    </div>
                    <button type="submit" class="w-full bg-emerald-700 text-white font-semibold py-3 rounded-lg hover:bg-emerald-800 hover:scale-[1.02] transition-all duration-300">
                        <i class="fas fa-sign-in-alt mr-2"></i> Войти
                    </button>
                </div>
            </form>
            <div class="mt-6 text-center text-gray-600">
                <p>Данные для входа:</p>
                <p class="font-mono text-sm mt-2">admin / admin</p>
            </div>
        </div>
    </div>
{% endblock %}
